<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신규 학원 등록 요청 - LearnMap</title>
    <!-- Google Fonts Inter, Outfit, Noto Sans KR -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #2979ff;
            --primary-hover: #1565c0;
            --deep-blue: #0d47a1;
            --bg-primary: #f8f9fa;
            --bg-card: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --border-color: #e0e0e0;
            --success-green: #2e7d32;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-primary);
            color: var(--text-main);
            font-family: 'Noto Sans KR', 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--bg-card);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            padding: 28px;
            margin: 20px;
            box-sizing: border-box;
        }

        h2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--deep-blue);
            margin: 0 0 8px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
            margin: 0 0 24px 0;
            word-break: keep-all;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="tel"],
        select,
        textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            box-sizing: border-box;
            background: white;
            color: var(--text-main);
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus,
        input[type="tel"]:focus,
        select:focus,
        textarea:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(41, 121, 255, 0.15);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn-submit {
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
        }

        .btn-back {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            border-radius: 8px;
            padding: 10px;
            font-size: 13px;
            font-weight: 500;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            text-align: center;
            text-decoration: none;
            display: block;
            box-sizing: border-box;
        }

        .btn-back:hover {
            background: #f1f3f5;
            color: var(--text-main);
        }

        .success-box {
            display: none;
            text-align: center;
            padding: 40px 10px;
        }

        .success-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .success-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--success-green);
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 등록 폼 영역 -->
        <div id="requestFormSection">
            <h2>🏫 학원 정보 신규 등록 요청</h2>
            <p class="subtitle">지도에 노출되지 않는 새로운 학원 정보를 수집하여 데이터베이스에 반영해 드립니다. 아래 정보를 작성해 주세요.</p>
            
            <form id="academyRegisterForm">
                <div class="form-group">
                    <label for="academyName">학원명 <span style="color: red;">*</span></label>
                    <input type="text" id="academyName" placeholder="예: 미래수학 전문학원" required>
                </div>
                
                <div class="form-group">
                    <label for="academyAddress">학원 주소 <span style="color: red;">*</span></label>
                    <input type="text" id="academyAddress" placeholder="예: 서울특별시 강남구 대치동 123-45" required>
                </div>
                
                <div class="form-group">
                    <label for="academyType">교육 대상/과목 <span style="color: red;">*</span></label>
                    <select id="academyType" required>
                        <option value="">선택해주세요</option>
                        <option value="수학">수학 전문</option>
                        <option value="영어">영어 전문</option>
                        <option value="국어/논술">국어 및 논술</option>
                        <option value="종합/보습">입시 종합 / 보습</option>
                        <option value="과학">과학 전문</option>
                        <option value="기타">기타 / 예체능</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="academyContact">연락처 (선택)</label>
                    <input type="tel" id="academyContact" placeholder="예: 02-123-4567">
                </div>

                <div class="form-group">
                    <label for="extraComments">추가 요청 사항 및 설명 (선택)</label>
                    <textarea id="extraComments" placeholder="학원 개설 정보, 강사진 구성, 혹은 홈페이지 주소 등 추가 정보를 적어주세요."></textarea>
                </div>

                <button type="submit" class="btn-submit">💾 등록 요청 제출</button>
                <a href="/" class="btn-back">이전으로 돌아가기</a>
            </form>
        </div>

        <!-- 등록 성공 영역 -->
        <div id="successSection" class="success-box">
            <div class="success-icon">🎉</div>
            <div class="success-title">등록 요청 완료!</div>
            <p class="subtitle" style="margin-bottom: 28px;">요청하신 학원 정보가 관리자에게 성공적으로 전송되었습니다.<br>데이터 검토 후 빠른 시일 내에 지도에 반영해 드리겠습니다.</p>
            <a href="/" class="btn-submit" style="text-decoration: none; display: block; text-align: center;">홈으로 이동</a>
        </div>
    </div>

    <script>
        document.getElementById('academyRegisterForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const academyName = document.getElementById('academyName').value.trim();
            const academyAddress = document.getElementById('academyAddress').value.trim();
            const academyType = document.getElementById('academyType').value;
            const academyContact = document.getElementById('academyContact').value.trim();
            const extraComments = document.getElementById('extraComments').value.trim();

            const payload = {
                targetId: 'academy_registration_request',
                nickname: '학부모 제안',
                content: `[신규 학원 등록 요청]\n학원명: ${academyName}\n주소: ${academyAddress}\n과목: ${academyType}\n연락처: ${academyContact}\n비고: ${extraComments}`
            };

            try {
                // 기존 범용 타운톡 저장 API를 통해 제보 데이터를 전송/저장하여 즉각 연계
                const response = await fetch('/api/towntalk', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    document.getElementById('requestFormSection').style.display = 'none';
                    document.getElementById('successSection').style.display = 'block';
                } else {
                    alert('등록 요청 중 서버 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.');
                }
            } catch (err) {
                console.error(err);
                alert('네트워크 연결 오류가 발생했습니다.');
            }
        });
    </script>
</body>
</html>
